<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Khaled · Links</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e14;
      --card: #16161f;
      --card-border: rgba(255,255,255,0.07);
      --text: #f0f0f8;
      --muted: #7a7a9a;
      --font-head: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;

      --snap:   #FFFC00;
      --tiktok: #ff2d55;
      --lboxd:  #00c030;
      --x:      #e7e9ea;
      --ig:     #f77737;
      --yt:     #FF0000;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
    }

    /* Noise texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    /* Gradient blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.12;
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 { width: 400px; height: 400px; background: #ff2d55; top: -100px; right: -100px; }
    .blob-2 { width: 350px; height: 350px; background: #00c0ff; bottom: -80px; left: -80px; }
    .blob-3 { width: 300px; height: 300px; background: #FFFC00; top: 40%; left: 40%; }

    .container {
      position: relative;
      z-index: 1;
      max-width: 480px;
      margin: 0 auto;
      padding: 48px 20px 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Avatar / identity */
    .avatar-wrap {
      position: relative;
      margin-bottom: 20px;
      animation: popIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.7); }
      to   { opacity: 1; transform: scale(1); }
    }

    .avatar-ring {
      width: 84px;
      height: 84px;
      border-radius: 50%;
      padding: 3px;
      background: conic-gradient(#ff2d55, #FFFC00, #00c030, #00c0ff, #f77737, #ff2d55);
      animation: spinRing 6s linear infinite;
    }

    @keyframes spinRing {
      to { transform: rotate(360deg); }
    }

    .avatar-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-head);
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -1px;
      color: #fff;
    }

    /* Name & handle */
    .name {
      font-family: var(--font-head);
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #fff;
      text-align: center;
      animation: fadeUp 0.5s 0.15s ease both;
    }

    .handle {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
      letter-spacing: 0.5px;
      text-align: center;
      animation: fadeUp 0.5s 0.25s ease both;
    }

    .bio {
      font-size: 13px;
      color: var(--muted);
      margin-top: 10px;
      text-align: center;
      max-width: 280px;
      line-height: 1.6;
      animation: fadeUp 0.5s 0.3s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Divider */
    .divider {
      width: 40px;
      height: 3px;
      border-radius: 2px;
      background: conic-gradient(#ff2d55, #FFFC00, #00c030, #00c0ff);
      margin: 24px 0;
      animation: fadeUp 0.5s 0.35s ease both;
    }

    /* Links grid */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      text-decoration: none;
      color: var(--text);
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
    }

    .link-card:nth-child(1) { animation-delay: 0.4s; }
    .link-card:nth-child(2) { animation-delay: 0.5s; }
    .link-card:nth-child(3) { animation-delay: 0.6s; }
    .link-card:nth-child(4) { animation-delay: 0.7s; }
    .link-card:nth-child(5) { animation-delay: 0.8s; }
    .link-card:nth-child(6) { animation-delay: 0.9s; }

    /* left color bar */
    .link-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: var(--c);
      border-radius: 0 2px 2px 0;
    }

    /* hover glow bg */
    .link-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at left center, var(--c) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.35s;
    }

    .link-card:hover {
      transform: translateY(-2px) scale(1.01);
      border-color: var(--c);
      box-shadow: 0 8px 30px rgba(0,0,0,0.4), 0 0 0 1px var(--c);
    }

    .link-card:hover::after { opacity: 0.06; }

    .icon-wrap {
      position: relative;
      z-index: 1;
      width: 46px;
      height: 46px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--card-border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, border-color 0.2s;
    }

    .link-card:hover .icon-wrap {
      background: color-mix(in srgb, var(--c) 15%, transparent);
      border-color: color-mix(in srgb, var(--c) 40%, transparent);
    }

    .icon-wrap svg {
      width: 22px;
      height: 22px;
      fill: var(--c);
    }

    .link-info {
      position: relative;
      z-index: 1;
      flex: 1;
    }

    .link-name {
      font-family: var(--font-head);
      font-size: 17px;
      font-weight: 700;
      color: #fff;
      line-height: 1.1;
    }

    .link-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
      letter-spacing: 0.3px;
    }

    .link-arrow {
      position: relative;
      z-index: 1;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 1px solid var(--card-border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 14px;
      flex-shrink: 0;
      transition: border-color 0.2s, color 0.2s, transform 0.2s, background 0.2s;
    }

    .link-card:hover .link-arrow {
      border-color: var(--c);
      color: var(--c);
      background: color-mix(in srgb, var(--c) 10%, transparent);
      transform: translateX(3px);
    }

    /* Footer */
    .footer {
      margin-top: 48px;
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      letter-spacing: 0.5px;
      animation: fadeUp 0.5s 1.1s ease both;
    }

    .footer .dot {
      display: inline-block;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: conic-gradient(#ff2d55, #FFFC00, #00c0ff);
      vertical-align: middle;
      margin: 0 6px;
      animation: spinRing 3s linear infinite;
    }

    /* Mobile tap feedback */
    @media (hover: none) {
      .link-card:active {
        transform: scale(0.97);
        border-color: var(--c);
      }
    }
  </style>
</head>
